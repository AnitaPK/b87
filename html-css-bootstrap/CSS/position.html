<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     .contOne{
        width: 600px;
        height: 600px;
        background-color: pink;
        position: relative;
     }
     .redContainer{
        width: 100%;
        height: 100px;
        background-color: red;
     }
     .grayBox{
        width: 300px;
        height: 300px;
        background-color: gray;
        background-image: linear-gradient(to right bottom,yellow,gray,green);
        position: absolute;
        bottom: 100px;
        left: 200px;
     }
     .bordercontainer{
        width: 200px;
        height: 500px;
        border: 1px solid black;
        position: absolute;
        top: 100px;
        left: 0;
     }
     .blueBox{
        width: 200px;
        height: 100px;
        background-color: blue;
        position: absolute;
        /* top, bottom left right z-index  */
        bottom :50px;
        right:50px;
        border-radius: 40px 0 40px 0;
     }
    </style>
</head>
<body>
    <pre>

        position  
              static 
              absolute 
              relative 
              fixed 
              sticky 

    </pre>

    <div class="contOne">
        <div class="redContainer"></div>
        <div class="grayBox"></div>
        <div class="bordercontainer"></div>
        <div class="blueBox"></div>
    </div>
</body>
</html>
