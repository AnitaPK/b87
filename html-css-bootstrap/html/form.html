<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    
    <h1 align="center">Register Form</h1>

    <form action="" method="get/post" onsubmit="" >
        <label for="userName">Name<sup><font color="red">*</font></sup>:</label>
        <input type="text" id="userName" name="uName">
        <br />
        <label for="userEmail">Email</label>
        <input type="email" id="userEmail" placeholder="uname@gmail.com" />
        <br />

        <label for="password" >Password</label>
        <input type="password" id="userPassword" name="uPass">
        <br />

        <label for="fileUpload">Marksheet</label>
        <input type="file">
        <br />

        <label for="selectColor">Color </label>
        <input type="color" id="" value="blue">
        <br />

        <label for="">Age</label>
        <input type="number" value="20" name="age" />
        <br />

        <label for="">Select Joining Date</label>
        <input type="date">
        <br />

        <label for="">Select Gender</label>
        <input type="radio" value="female" name="gender">Female
        <input type="radio" value="male" name="gender">Male
        <br />
        <br />

        <input type="checkbox">
        <label for="">I agree with <a href="#">Terms and Conditions</a></label>
        <br />
        <br />
        <br />

        <select name="language">
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="javascript">Javascript</option>
            <option value="reactjs">ReactJS</option>
        </select>
        <br />

        <button>CLICK ME</button>

        <input type="submit">
        <input type="reset">
    </form>

</body>
</html>
