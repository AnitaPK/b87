<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>String Operations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1 class="tex-primary p-4 text-center">String Operations in Javascript</h1>

    <div class="container w-50">
        <div class="mb-3">
            <label for="inputPara" class="form-label">Example textarea</label>
            <textarea class="form-control" id="inputPara" rows="3"></textarea>
        </div>

        <div class="container bg-secondary text-white" style="height: 100px;" 
        id="result">
            Result will show here
        </div>
    </div>

    <div class="container mt-3">
        <div class="row">
            <div class="col">
                <button class="btn btn-primary" 
                onclick="convertToUpperCase()">
                Convert To Upper Case
            </button>
            </div>
            <div class="col">
                <button class="btn btn-primary">Convert To Lower Case</button>
            </div>
            <div class="col">
                <button class="btn btn-primary">Convert To Camel Case</button>
            </div>
               <div class="col">
                <button class="btn btn-primary">Extract First Word</button>
            </div>
        </div>
         <div class="row mt-4">
            <div class="col">
                <button class="btn btn-primary">Count Number of Lines</button>
            </div>
            <div class="col">
                <button class="btn btn-primary" onclick="countVowels()">Count Vowels</button>
            </div>
            <div class="col">
                <button class="btn btn-primary">Count Consonents</button>
            </div>
               <div class="col">
                <button class="btn btn-primary">Extract Special Characters</button>
            </div>
        </div>
         <div class="row mt-4">
            <div class="col">
                <button class="btn btn-primary" onclick="CheckPalindrom()">Check Palindrom</button>
            </div>
            <div class="col">
                <button class="btn btn-primary">Count Spaces</button>
            </div>
            <div class="col">
                <button class="btn btn-primary">Replace All Spaces with Hyphens</button>
            </div>
               <div class="col">
                <button class="btn btn-primary">Sort The Words</button>
            </div>
        </div>
    </div>










<script src="./scripts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
